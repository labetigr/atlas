
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100dvh; width: 100vw; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .atlas-bg { 
            background: #000 url('atlas_final_4k.png') no-repeat center center; 
            background-size: cover; 
            height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* ΚΟΡΥΦΗ: Τίτλος & 3 Πυλώνες πάνω από τον κύλινδρο */
        .top-nav { position: absolute; top: 4vh; width: 100%; text-align: center; z-index: 10; }
        h1 { font-size: 2.5rem; letter-spacing: 15px; text-transform: uppercase; font-weight: 200; margin-bottom: 1.5vh; }
        .pillars { display: flex; justify-content: center; gap: 30px; }
        .p-node { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.8); }

        /* ΒΑΣΗ: Ενσωμάτωση στο μάρμαρο */
        .bottom-action { position: absolute; bottom: 7vh; width: 100%; text-align: center; }
        .marble-btn { 
            display: inline-block; padding: 15px 50px; border: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.6); text-decoration: none; text-transform: uppercase; letter-spacing: 5px;
            background: rgba(255,255,255,0.02); backdrop-filter: blur(5px); box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .marble-btn:hover { color: #fff; background: rgba(255,255,255,0.1); letter-spacing: 7px; }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; letter-spacing: 8px; }
            .pillars { flex-direction: column; gap: 5px; }
            .bottom-action { bottom: 5vh; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        <div class="top-nav">
            <h1>ΑΤΛΑΣ</h1>
            <div class="pillars">
                <div class="p-node">Αυτονομη Νοημοσυνη</div>
                <div class="p-node">Καθολικος Συγχρονισμος</div>
                <div class="p-node">Γνωστικος Εξωσκελετος</div>
            </div>
        </div>
        <div class="bottom-action">
            <a href="mailto:info@labeti.gr" class="marble-btn">Επικοινωνια</a>
        </div>
    </div>
</body>
</html>
