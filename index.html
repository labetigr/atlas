
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100dvh; /* Dynamic Height για εξάλειψη σκρολαρίσματος σε κινητά */
            width: 100vw; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        
        .atlas-bg { 
            background: url('atlas_final_4k.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100%; 
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ---------------- ΚΕΦΑΛΗ: ΤΙΤΛΟΣ & 3 ΠΥΛΩΝΕΣ ---------------- */
        .header-top {
            position: absolute;
            top: 5vh; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        h1 { 
            font-size: calc(2.2rem + 1.5vw); 
            letter-spacing: 25px; 
            text-transform: uppercase; 
            font-weight: 200;
            text-shadow: 0px 4px 30px rgba(0,0,0,1);
            margin: 0 0 3vh 0;
            padding-left: 25px; /* Κεντράρισμα λόγω letter-spacing */
        }

        .pillars-row {
            display: flex;
            justify-content: center;
            gap: 5vw;
            width: 100%;
        }

        .pillar {
            font-size: calc(0.75rem + 0.3vw);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255,255,255,0.4), 2px 2px 10px rgba(0,0,0,1);
            color: rgba(255,255,255,0.9);
            text-align: center;
        }

        /* ---------------- ΒΑΣΗ: ΕΝΣΩΜΑΤΩΜΕΝΟ ΚΟΥΜΠΙ ΣΤΟ ΜΑΡΜΑΡΟ ---------------- */
        .footer-base {
            position: absolute;
            bottom: 6vh; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .btn-engraved { 
            display: inline-block; 
            padding: 16px 55px; 
            border: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            font-size: 0.85rem; 
            letter-spacing: 6px; 
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase;
            /* Εφέ σκαλίσματος στην πέτρα */
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(5px);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            font-weight: 300;
        }

        .btn-engraved:hover { 
            color: #fff;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05), 0 0 40px rgba(255,255,255,0.1);
            letter-spacing: 8px;
        }

        /* ---------------- ΚΙΝΗΤΑ (RESPONSIVE) ---------------- */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; letter-spacing: 15px; margin-bottom: 2vh; }
            .pillars-row { gap: 15px; flex-direction: column; align-items: center; }
            .pillar { font-size: 0.8rem; letter-spacing: 2px; margin-bottom: 5px; }
            .footer-base { bottom: 4vh; }
            .btn-engraved { padding: 12px 40px; font-size: 0.75rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        
        <div class="header-top">
            <h1>ΑΤΛΑΣ</h1>
            <div class="pillars-row">
                <div class="pillar">Αυτονομη Νοημοσυνη</div>
                <div class="pillar">Καθολικος Συγχρονισμος</div>
                <div class="pillar">Γνωστικος Εξωσκελετος</div>
            </div>
        </div>

        <div class="footer-base">
            <a href="mailto:EMAIL_SOU_EDO@gmail.com?subject=Πρωτόκολλο%20ΗΩ:%20Επικοινωνία" class="btn-engraved">Επικοινωνια</a>
        </div>

    </div>
</body>
</html>
