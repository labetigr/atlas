
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            height: 100dvh; 
            width: 100vw; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        
        .atlas-bg { 
            background-color: #000;
            background-image: url('atlas_final_4k.png'); 
            background-repeat: no-repeat;
            background-position: center bottom; 
            background-size: cover; 
            height: 100%; 
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ΚΟΡΥΦΗ: Ανύψωση κατά μία γραμμή (από 4vh σε 2vh) */
        .top-section {
            position: absolute;
            top: 2vh; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        h1 { 
            font-size: calc(1.8rem + 1.2vw); 
            letter-spacing: 20px; 
            text-transform: uppercase; 
            font-weight: 200;
            text-shadow: 0px 4px 20px rgba(0,0,0,1);
            margin: 0 0 1vh 0;
            padding-left: 20px;
        }

        .pillars-nav {
            display: flex;
            justify-content: center;
            gap: 4vw;
        }

        .pillar {
            font-size: calc(0.65rem + 0.3vw);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            color: rgba(255,255,255,0.8);
        }

        /* ΒΑΣΗ: Κάθοδος χαμηλότερα στο μάρμαρο (από 8vh σε 4vh) */
        .bottom-section {
            position: absolute;
            bottom: 4vh; 
            width: 100%;
            text-align: center;
            z-index: 20;
        }

        .marble-link { 
            display: inline-block; 
            padding: 15px 50px; 
            border: 1px solid rgba(255,255,255,0.08); 
            color: rgba(255,255,255,0.5); 
            text-decoration: none; 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            transition: 0.8s ease; 
            text-transform: uppercase;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(3px);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.7);
            font-weight: 300;
        }

        .marble-link:hover { 
            color: #fff;
            background: rgba(255,255,255,0.05);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.05);
            letter-spacing: 7px;
        }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            h1 { font-size: 1.6rem; letter-spacing: 12px; }
            .pillars-nav { flex-direction: column; gap: 5px; }
            .pillar { font-size: 0.75rem; }
            .bottom-section { bottom: 3vh; }
            .marble-link { padding: 12px 35px; width: 85%; max-width: 260px; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        
        <div class="top-section">
            <h1>ΑΤΛΑΣ</h1>
            <div class="pillars-nav">
                <div class="pillar">Αυτονομη Νοημοσυνη</div>
                <div class="pillar">Καθολικος Συγχρονισμος</div>
                <div class="pillar">Γνωστικος Εξωσκελετος</div>
            </div>
        </div>

        <div class="bottom-section">
            <a href="mailto:ΤΟ-EMAIL-ΣΟΥ@gmail.com" class="marble-link">ΕΠΙΚΟΙΝΩΝΙΑ</a>
        </div>

    </div>
</body>
</html>
