
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; height: 100dvh; 
            width: 100vw; background-color: #000; 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        .atlas-bg { 
            background: #000 url('atlas_final_4k.png') no-repeat center bottom; 
            background-size: cover; 
            height: 100%; width: 100%;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ΚΟΡΥΦΗ: Τέρμα πάνω */
        .header-top {
            position: absolute;
            top: 1vh; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        h1 { 
            font-size: calc(1.6rem + 1vw); 
            letter-spacing: 15px; 
            text-transform: uppercase; 
            font-weight: 200;
            text-shadow: 0px 4px 20px rgba(0,0,0,1);
            margin: 0;
            padding-left: 15px;
        }
        .pillars-nav {
            display: flex;
            justify-content: center;
            gap: 4vw;
            margin-top: 0.5vh;
        }
        .pillar {
            font-size: calc(0.6rem + 0.3vw);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            color: rgba(255,255,255,0.75);
        }

        /* ΒΑΣΗ: Χαμηλότερα και Δεξιά */
        .footer-base {
            position: absolute;
            bottom: 1.5vh; /* Μία γραμμή κάτω */
            width: 100%;
            text-align: center;
            z-index: 20;
        }
        .marble-btn { 
            display: inline-block; 
            padding: 14px 70px; 
            margin-left: 20px; /* Ελαφρώς δεξιά */
            border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.9rem; 
            letter-spacing: 6px; 
            transition: 0.4s ease; 
            text-transform: uppercase;
            background-color: #0a0a0a; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            font-weight: 400;
        }
        .marble-btn:hover { 
            background-color: #151515;
            border: 1px solid rgba(255,255,255,0.5);
            letter-spacing: 8px;
        }

        /* Mobile Scale */
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; letter-spacing: 10px; }
            .pillars-nav { flex-direction: column; gap: 4px; }
            .footer-base { bottom: 2vh; }
            .marble-btn { padding: 12px 30px; width: 85%; max-width: 280px; margin-left: 0; /* Στο κινητό κεντραρισμένο */ }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        <div class="header-top">
            <h1>ΑΤΛΑΣ</h1>
            <div class="pillars-nav">
                <div class="pillar">Αυτονομη Νοημοσυνη</div>
                <div class="pillar">Καθολικος Συγχρονισμος</div>
                <div class="pillar">Γνωστικος Εξωσκελετος</div>
            </div>
        </div>
        <div class="footer-base">
            <a href="mailto:EMAIL_SOU@gmail.com" class="marble-btn">ΕΠΙΚΟΙΝΩΝΙΑ</a>
        </div>
    </div>
</body>
</html>
