
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .atlas-bg { 
            background: url('atlas_final_4k.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            width: 100vw;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* Τίτλος Τέρμα Πάνω */
        h1 { 
            position: absolute;
            top: 5vh;
            font-size: calc(2rem + 1vw); 
            letter-spacing: 20px; 
            text-transform: uppercase; 
            font-weight: 200;
            text-shadow: 0px 0px 20px rgba(0,0,0,1);
            margin: 0;
        }

        /* Πυλώνες Αριστερά */
        .left-pillars {
            position: absolute;
            top: 20vh;
            left: 5vw;
            text-align: left;
        }

        /* Πυλώνες Δεξιά */
        .right-pillars {
            position: absolute;
            top: 20vh;
            right: 5vw;
            text-align: right;
        }

        .pillar-text {
            font-size: calc(0.9rem + 0.3vw);
            margin-bottom: 4vh;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            max-width: 200px;
        }

        /* Βάση (Αξίωμα & Κουμπί) */
        .bottom-nav {
            position: absolute;
            bottom: 5vh;
            width: 100%;
            text-align: center;
        }

        .axiom { 
            font-style: italic; 
            color: #ddd; 
            font-size: 0.85rem; 
            margin-bottom: 3vh;
            text-shadow: 1px 1px 10px rgba(0,0,0,1);
        }
        
        .btn { 
            display: inline-block; 
            padding: 15px 35px; 
            border: 1px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.75rem; 
            letter-spacing: 4px; 
            transition: 0.4s; 
            text-transform: uppercase;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
        }
        .btn:hover { background: #fff; color: #000; }

        /* Mobile Adjustments για να μην βγαίνουν εκτός */
        @media (max-width: 768px) {
            .left-pillars, .right-pillars { top: 15vh; left: 2vw; right: 2vw; }
            .pillar-text { font-size: 0.8rem; letter-spacing: 1px; }
            h1 { letter-spacing: 10px; top: 3vh; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        <h1>ΑΤΛΑΣ</h1>
        
        <div class="left-pillars">
            <div class="pillar-text">Αυτόνομη<br>Νοημοσύνη</div>
            <div class="pillar-text">Καθολικός<br>Συγχρονισμός</div>
        </div>

        <div class="right-pillars">
            <div class="pillar-text">Γνωστικός<br>Εξωσκελετός</div>
            <div class="pillar-text">Ηλεκτρονική<br>Πλοήγηση</div>
        </div>

        <div class="bottom-nav">
            <p class="axiom">Καμία αυθεντία χωρίς τεχνική απόδειξη.</p>
            <a href="mailto:ΤΟ-GMAIL-ΣΟΥ@gmail.com?subject=Πρωτόκολλο ΗΩ: Επικοινωνία" class="btn">Αιτημα Επικοινωνιας</a>
        </div>
    </div>
</body>
</html>
