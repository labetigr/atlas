
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .atlas-bg { 
            background: url('atlas_final_4k.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }
        .overlay { 
            background: rgba(0, 0, 0, 0.75); 
            width: 90%; 
            max-width: 500px; 
            padding: 60px 40px; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        h1 { 
            font-size: 3rem; 
            letter-spacing: 20px; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            font-weight: 200; 
        }
        .content { margin: 30px 0; }
        .content p { 
            font-size: 1.2rem; 
            margin: 15px 0; 
            font-weight: 300; 
            letter-spacing: 2px; 
        }
        .axiom { 
            font-style: italic; 
            color: #888; 
            margin-top: 50px; 
            font-size: 0.9rem; 
            letter-spacing: 1px;
            border-top: 1px solid #333;
            padding-top: 25px;
        }
        .btn { 
            display: inline-block; 
            margin-top: 40px; 
            padding: 20px 50px; 
            border: 1px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.8rem; 
            letter-spacing: 5px; 
            transition: 0.5s; 
            text-transform: uppercase; 
        }
        .btn:hover { background: #fff; color: #000; }
    </style>
</head>
<body>
    <div class="atlas-bg">
        <div class="overlay">
            <h1>ΑΤΛΑΣ</h1>
            
            <div class="content">
                <p>Αυτόνομη Νοημοσύνη</p>
                <p>Καθολικός Συγχρονισμός</p>
                <p>Γνωστικός Εξωσκελετός</p>
            </div>

            <p class="axiom">Καμία αυθεντία χωρίς τεχνική απόδειξη.</p>

            <a href="mailto:ΤΟ-GMAIL-ΣΟΥ@gmail.com?subject=Αίτημα Πρόσβασης: Πρωτόκολλο ΗΩ" class="btn">Αίτημα Πρόσβασης</a>
        </div>
    </div>
</body>
</html>
