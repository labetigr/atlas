
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .atlas-bg { 
            background: url('atlas_final_4k.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            padding: 15px;
        }

        .overlay { 
            background: rgba(0, 0, 0, 0.4); 
            width: 100%;
            max-width: 480px; 
            max-height: 90vh; /* Κλειδώνει το ύψος για να μην θέλει σκρολάρισμα */
            padding: 4vh 20px; 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 { 
            font-size: calc(1.8rem + 1vw); 
            letter-spacing: 12px; 
            margin: 0 0 3vh 0; 
            text-transform: uppercase; 
            font-weight: 200;
        }
        
        .content p { 
            font-size: calc(0.9rem + 0.3vw); 
            margin: 2vh 0; 
            font-weight: 300; 
            letter-spacing: 1.5px; 
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        .axiom { 
            font-style: italic; 
            color: #ccc; 
            margin-top: 3vh; 
            font-size: 0.8rem; 
            border-top: 1px solid rgba(255,255,255,0.2); 
            padding-top: 2vh; 
        }
        
        .btn { 
            display: inline-block; 
            margin-top: 4vh; 
            padding: 15px 30px; 
            border: 1px solid #fff; 
            color: #fff; 
            text-decoration: none; 
            font-size: 0.7rem; 
            letter-spacing: 3px; 
            transition: 0.4s; 
            text-transform: uppercase;
            background: rgba(0,0,0,0.5);
            font-weight: bold;
        }
        .btn:hover { background: #fff; color: #000; }

        /* Προσαρμογή για πολύ μικρές οθόνες κινητών */
        @media (max-height: 600px) {
            h1 { font-size: 1.5rem; margin-bottom: 1vh; }
            .content p { margin: 1vh 0; font-size: 0.85rem; }
            .btn { margin-top: 2vh; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        <div class="overlay">
            <h1>ΑΤΛΑΣ</h1>
            
            <div class="content">
                <p>Αυτόνομη Νοημοσύνη</p>
                <p>Καθολικός Συγχρονισμός</p>
                <p>Γνωστικός Εξωσκελετός</p>
                <p>Ηλεκτρονική Πλοήγηση</p>
            </div>

            <p class="axiom">Καμία αυθεντία χωρίς τεχνική απόδειξη.</p>

            <a href="mailto:ΤΟ-GMAIL-ΣΟΥ@gmail.com?subject=Πρωτόκολλο ΗΩ: Αίτημα Επικοινωνίας" class="btn">Αιτημα Επικοινωνιας</a>
        </div>
    </div>
</body>
</html>
