
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; 
            height: 100vh; height: 100dvh; 
            width: 100vw; background-color: #000; 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        .atlas-bg { 
            background: #000 url('atlas_final_4k.png') no-repeat center bottom; 
            background-size: cover; 
            height: 100%; width: 100%;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ΚΟΡΥΦΗ: Τέρμα πάνω για να απελευθερωθεί ο κύλινδρος */
        .header-top {
            position: absolute;
            top: 0.5vh; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }
        h1 { 
            font-size: calc(1.6rem + 1vw); 
            letter-spacing: 15px; 
            text-transform: uppercase; 
            font-weight: 200;
            text-shadow: 0px 4px 20px rgba(0,0,0,1);
            margin: 0;
            padding-left: 15px;
        }
        .pillars-nav {
            display: flex;
            justify-content: center;
            gap: 3vw;
            margin-top: 0.2vh;
        }
        .pillar {
            font-size: calc(0.55rem + 0.3vw);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0,0,0,1);
            color: rgba(255,255,255,0.7);
        }

        /* ΒΑΣΗ: Το κουμπί που σβήνει το μάρμαρο */
        .footer-base {
            position: absolute;
            bottom: 1.5vh; 
            width: 100%;
            text-align: center;
            z-index: 20;
        }
        .marble-btn { 
            display: inline-block; 
            padding: 12px 65px; 
            border: 1px solid rgba(255,255,255,0.15); 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            font-size: 0.85rem; 
            letter-spacing: 6px; 
            transition: 0.5s ease; 
            text-transform: uppercase;
            /* Σχεδόν συμπαγές για να καλύψει τα γράμματα της εικόνας */
            background: rgba(15, 15, 15, 0.92); 
            backdrop-filter: blur(8px);
            box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 10px 30px rgba(0,0,0,0.5);
            font-weight: 300;
        }
        .marble-btn:hover { 
            color: #fff;
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255,255,255,0.4);
            letter-spacing: 8px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.4rem; letter-spacing: 8px; }
            .pillars-nav { flex-direction: column; gap: 3px; }
            .footer-base { bottom: 2vh; }
            .marble-btn { padding: 10px 30px; width: 80%; max-width: 260px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        <div class="header-top">
            <h1>ΑΤΛΑΣ</h1>
            <div class="pillars-nav">
                <div class="pillar">Αυτονομη Νοημοσυνη</div>
                <div class="pillar">Καθολικος Συγχρονισμος</div>
                <div class="pillar">Γνωστικος Εξωσκελετος</div>
            </div>
        </div>
        <div class="footer-base">
            <a href="mailto:ΤΟ-GMAIL-ΣΟΥ@gmail.com" class="marble-btn">ΕΠΙΚΟΙΝΩΝΙΑ</a>
        </div>
    </div>
</body>
</html>
