
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ΑΤΛΑΣ | ΠΡΩΤΟΚΟΛΛΟ ΗΩ</title>
    <style>
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100dvh; /* Δυναμικό ύψος για εξάλειψη scroll */
            width: 100vw; 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
        }
        
        .atlas-bg { 
            background: url('atlas_final_4k.png') no-repeat center center fixed; 
            background-size: cover; 
            height: 100%; 
            width: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ΚΟΡΥΦΗ: Τίτλος και Πυλώνες πάνω από τον κύλινδρο */
        .top-section {
            position: absolute;
            top: 4vh;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        h1 { 
            font-size: calc(2rem + 1.5vw); 
            letter-spacing: 25px; 
            text-transform: uppercase; 
            font-weight: 200;
            text-shadow: 0px 4px 25px rgba(0,0,0,1);
            margin: 0 0 2vh 0;
            padding-left: 25px;
        }

        .pillars-nav {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
        }

        .pillar-link {
            font-size: calc(0.7rem + 0.3vw);
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            color: rgba(255,255,255,0.85);
        }

        /* ΒΑΣΗ: Ενσωματωμένο κουμπί στο μάρμαρο */
        .bottom-section {
            position: absolute;
            bottom: 6vh; 
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .marble-btn { 
            display: inline-block; 
            padding: 18px 60px; 
            /* Αρχιτεκτονική ενσωμάτωση στο μάρμαρο */
            border: 1px solid rgba(255,255,255,0.05); 
            color: rgba(255,255,255,0.6); 
            text-decoration: none; 
            font-size: 0.9rem; 
            letter-spacing: 6px; 
            transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); 
            text-transform: uppercase;
            background: rgba(255,255,255,0.01);
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            font-weight: 300;
        }

        .marble-btn:hover { 
            color: #fff;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: inset 0 0 25px rgba(255,255,255,0.05), 0 0 40px rgba(255,255,255,0.1);
            letter-spacing: 9px;
            cursor: pointer;
        }

        /* ΠΡΟΣΑΡΜΟΓΗ ΓΙΑ ΚΙΝΗΤΑ */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; letter-spacing: 12px; margin-bottom: 1.5vh; }
            .pillars-nav { gap: 15px; flex-direction: column; align-items: center; }
            .pillar-link { font-size: 0.75rem; letter-spacing: 2px; }
            .bottom-section { bottom: 4vh; }
            .marble-btn { padding: 14px 40px; font-size: 0.75rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>
    <div class="atlas-bg">
        
        <div class="top-section">
            <h1>ΑΤΛΑΣ</h1>
            <div class="pillars-nav">
                <div class="pillar-link">Αυτονομη Νοημοσυνη</div>
                <div class="pillar-link">Καθολικος Συγχρονισμος</div>
                <div class="pillar-link">Γνωστικος Εξωσκελετος</div>
            </div>
        </div>

        <div class="bottom-section">
            <a href="mailto:EMAIL_SOU@gmail.com" class="marble-btn">Επικοινωνια</a>
        </div>

    </div>
</body>
</html>
